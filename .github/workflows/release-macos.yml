name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    env:
      IRFLOW_UPDATE_BASE_URL: ${{ vars.IRFLOW_UPDATE_BASE_URL }}
      IRFLOW_UPDATE_CHANNEL: ${{ vars.IRFLOW_UPDATE_CHANNEL }}
      IRFLOW_UPDATE_BUCKET: ${{ vars.IRFLOW_UPDATE_BUCKET }}
      IRFLOW_UPDATE_PREFIX: ${{ vars.IRFLOW_UPDATE_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
      AWS_ENDPOINT_URL_S3: ${{ vars.AWS_ENDPOINT_URL_S3 }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Ensure release tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            brew install gh
          fi
          if ! command -v aws >/dev/null 2>&1; then
            brew install awscli
          fi

      - name: Validate release configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for var_name in \
            IRFLOW_UPDATE_BASE_URL \
            IRFLOW_UPDATE_BUCKET \
            AWS_REGION \
            AWS_ACCESS_KEY_ID \
            AWS_SECRET_ACCESS_KEY \
            CSC_LINK \
            CSC_KEY_PASSWORD \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID
          do
            if [ -z "${!var_name:-}" ]; then
              missing+=("$var_name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing required GitHub variables/secrets: ${missing[*]}"
            exit 1
          fi

          pkg_version="$(node -p "require('./package.json').version")"
          expected_tag="v${pkg_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${pkg_version}. Expected ${expected_tag}."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build signed macOS release
        shell: bash
        run: |
          set -euo pipefail
          export IRFLOW_UPDATE_CHANNEL="${IRFLOW_UPDATE_CHANNEL:-latest}"
          npm run dist

      - name: Collect release artifacts
        id: artifacts
        shell: bash
        run: |
          set -euo pipefail

          channel="${IRFLOW_UPDATE_CHANNEL:-latest}"
          dmg_path="$(find release -maxdepth 1 -type f -name '*.dmg' | sort | head -n 1)"
          zip_path="$(find release -maxdepth 1 -type f -name '*.zip' | sort | head -n 1)"

          if [ "${channel}" = "latest" ]; then
            yml_name="latest-mac.yml"
          else
            yml_name="${channel}-mac.yml"
          fi

          yml_path="release/${yml_name}"
          if [ ! -f "${yml_path}" ]; then
            yml_path="$(find release -maxdepth 1 -type f -name '*-mac.yml' | sort | head -n 1)"
          fi

          for path_name in dmg_path zip_path yml_path; do
            if [ -z "${!path_name:-}" ] || [ ! -f "${!path_name}" ]; then
              echo "::error::Missing expected release artifact: ${path_name}"
              exit 1
            fi
          done

          echo "dmg=${dmg_path}" >> "${GITHUB_OUTPUT}"
          echo "zip=${zip_path}" >> "${GITHUB_OUTPUT}"
          echo "yml=${yml_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-${{ github.ref_name }}
          path: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.zip }}
            ${{ steps.artifacts.outputs.yml }}
          if-no-files-found: error

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if ! gh release view "${tag}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --title "IRFlow Timeline ${version}" \
              --notes "Automated macOS release for ${tag}."
          fi

          gh release upload "${tag}" \
            "${{ steps.artifacts.outputs.dmg }}" \
            "${{ steps.artifacts.outputs.zip }}" \
            "${{ steps.artifacts.outputs.yml }}" \
            --clobber

      - name: Publish updater feed to object storage
        shell: bash
        run: |
          set -euo pipefail

          prefix="${IRFLOW_UPDATE_PREFIX#/}"
          prefix="${prefix%/}"
          if [ -n "${prefix}" ]; then
            destination="s3://${IRFLOW_UPDATE_BUCKET}/${prefix}"
          else
            destination="s3://${IRFLOW_UPDATE_BUCKET}"
          fi

          endpoint_args=()
          if [ -n "${AWS_ENDPOINT_URL_S3:-}" ]; then
            endpoint_args+=(--endpoint-url "${AWS_ENDPOINT_URL_S3}")
          fi

          dmg_name="$(basename "${{ steps.artifacts.outputs.dmg }}")"
          zip_name="$(basename "${{ steps.artifacts.outputs.zip }}")"
          yml_name="$(basename "${{ steps.artifacts.outputs.yml }}")"

          aws s3 cp "${{ steps.artifacts.outputs.dmg }}" "${destination}/${dmg_name}" "${endpoint_args[@]}" \
            --cache-control "public, max-age=3600, immutable"

          aws s3 cp "${{ steps.artifacts.outputs.zip }}" "${destination}/${zip_name}" "${endpoint_args[@]}" \
            --cache-control "public, max-age=3600, immutable"

          aws s3 cp "${{ steps.artifacts.outputs.yml }}" "${destination}/${yml_name}" "${endpoint_args[@]}" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/yaml"
