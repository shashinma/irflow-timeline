<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1190" role="img" aria-labelledby="title desc">
  <title id="title">IRFlow Timeline current architecture</title>
  <desc id="desc">IRFlow Timeline v1.0.6 architecture with a semantic color system: orange = UI/output surface, violet = secure IPC bridge, blue = orchestration and network, amber = ingestion and compute, green = data and persistence, red = forensic detection. Shows the React renderer, preload bridge, Electron main services with grouped IPC, a worker-thread pool, the SQLite data engine with analyzers and the dual Sigma/Hayabusa detection engine, streaming parsers, and side connectors for evidence, external tools, network, state, and outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1016"/>
      <stop offset="100%" stop-color="#111922"/>
    </linearGradient>
    <linearGradient id="rendererGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1410"/>
      <stop offset="100%" stop-color="#251813"/>
    </linearGradient>
    <linearGradient id="preloadGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b1530"/>
      <stop offset="100%" stop-color="#221a3c"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#121b28"/>
      <stop offset="100%" stop-color="#162232"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#221a10"/>
      <stop offset="100%" stop-color="#2b1f14"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#112018"/>
      <stop offset="100%" stop-color="#16281f"/>
    </linearGradient>
    <linearGradient id="parserGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#221a10"/>
      <stop offset="100%" stop-color="#2b1f14"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <marker id="aOrange" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#e85d2a"/>
    </marker>
    <marker id="aViolet" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#a371f7"/>
    </marker>
    <marker id="aBlue" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#58a6ff"/>
    </marker>
    <marker id="aAmber" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#d29922"/>
    </marker>
    <marker id="aGreen" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#3fb950"/>
    </marker>
    <marker id="aRed" markerUnits="userSpaceOnUse" markerWidth="20" markerHeight="16" refX="17" refY="8" orient="auto">
      <path d="M0,0 L18,8 L0,16 Z" fill="#f85149"/>
    </marker>
    <style>
      text { font-family: Inter, "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #f4f7fb; font-size: 28px; font-weight: 800; }
      .subtitle { fill: #8ea0b5; font-size: 13px; }
      .section { font-size: 11.5px; font-weight: 700; letter-spacing: 1px; }
      .heading { fill: #f4f8fc; font-size: 18px; font-weight: 800; }
      .ctitle { fill: #eef3fa; font-size: 13px; font-weight: 700; }
      .csub { fill: #8a9cb0; font-size: 10.5px; }
      .item { fill: #dfe7ef; font-size: 12px; }
      .tiny { fill: #8093a6; font-size: 11px; }
      .panel { rx: 20; ry: 20; filter: url(#shadow); }
      .card { fill: rgba(255,255,255,0.028); stroke: rgba(255,255,255,0.07); stroke-width: 1; rx: 13; ry: 13; }
      .side { fill: rgba(255,255,255,0.022); stroke: rgba(255,255,255,0.08); stroke-width: 1; rx: 18; ry: 18; }
      .badge { fill: rgba(255,255,255,0.05); stroke: rgba(255,255,255,0.09); stroke-width: 1; rx: 12; ry: 12; }
      .spine { fill: none; stroke-width: 5; stroke-linecap: round; }
      .rail { fill: none; stroke-width: 4; stroke-linecap: round; }
      .flow { font-size: 11px; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="1190" fill="url(#bg)"/>
  <circle cx="1095" cy="70" r="200" fill="rgba(88,166,255,0.05)"/>
  <circle cx="140" cy="1090" r="200" fill="rgba(232,93,42,0.035)"/>

  <text x="220" y="56" class="title">IRFlow Timeline Architecture</text>
  <text x="220" y="82" class="subtitle">Modular v1.0.6 codebase — ~150 focused renderer + main-process modules.</text>
  <rect x="220" y="96" width="190" height="24" class="badge"/>
  <text x="315" y="112" text-anchor="middle" class="tiny">v1.0.6 workspace snapshot</text>

  <!-- ============ LEFT SIDE BOXES ============ -->
  <rect x="40" y="150" width="152" height="212" class="side" stroke="#d29922" stroke-opacity="0.55" filter="url(#shadow)"/>
  <circle cx="58" cy="176" r="4" fill="#d29922"/>
  <text x="70" y="180" fill="#d29922" class="section">EVIDENCE</text>
  <text x="60" y="208" class="item">CSV / TSV / LOG</text>
  <text x="60" y="230" class="item">XLSX / XLS / XLSM</text>
  <text x="60" y="252" class="item">EVTX</text>
  <text x="60" y="274" class="item">Plaso / .timeline</text>
  <text x="60" y="296" class="item">raw $MFT</text>
  <text x="60" y="318" class="item">raw $UsnJrnl:$J</text>
  <text x="60" y="340" class="item">RDP bitmap cache</text>

  <rect x="40" y="618" width="152" height="120" class="side" stroke="#f85149" stroke-opacity="0.55" filter="url(#shadow)"/>
  <circle cx="58" cy="644" r="4" fill="#f85149"/>
  <text x="70" y="648" fill="#f85149" class="section">EXTERNAL TOOLS</text>
  <text x="60" y="678" class="item">Hayabusa</text>
  <text x="60" y="694" class="csub">Sigma over EVTX</text>
  <text x="60" y="716" class="item">bmc-tools</text>
  <text x="60" y="732" class="csub">RDP bitmap cache</text>

  <!-- ============ RIGHT SIDE BOXES ============ -->
  <rect x="1088" y="160" width="152" height="140" class="side" stroke="#58a6ff" stroke-opacity="0.55" filter="url(#shadow)"/>
  <circle cx="1106" cy="186" r="4" fill="#58a6ff"/>
  <text x="1118" y="190" fill="#58a6ff" class="section">NETWORK</text>
  <text x="1108" y="218" class="item">VirusTotal API</text>
  <text x="1108" y="240" class="item">Hayabusa rules</text>
  <text x="1108" y="262" class="item">update feed</text>

  <rect x="1088" y="360" width="152" height="200" class="side" stroke="#e85d2a" stroke-opacity="0.55" filter="url(#shadow)"/>
  <circle cx="1106" cy="386" r="4" fill="#e85d2a"/>
  <text x="1118" y="390" fill="#e85d2a" class="section">OUTPUTS</text>
  <text x="1108" y="418" class="item">CSV / TSV / XLSX</text>
  <text x="1108" y="440" class="item">HTML / PDF report</text>
  <text x="1108" y="462" class="item">.tle sessions</text>
  <text x="1108" y="484" class="item">Sigma triage</text>
  <text x="1108" y="506" class="item">RDP evidence</text>

  <rect x="1088" y="700" width="152" height="210" class="side" stroke="#3fb950" stroke-opacity="0.55" filter="url(#shadow)"/>
  <circle cx="1106" cy="726" r="4" fill="#3fb950"/>
  <text x="1118" y="730" fill="#3fb950" class="section">LOCAL STATE</text>
  <text x="1108" y="758" class="item">temp SQLite / tab</text>
  <text x="1108" y="780" class="item">recent + presets</text>
  <text x="1108" y="802" class="item">sigma rules</text>
  <text x="1108" y="824" class="item">vt cache</text>
  <text x="1108" y="846" class="item">inspector profile</text>

  <!-- ============ RENDERER ============ -->
  <rect x="220" y="150" width="840" height="160" class="panel" fill="url(#rendererGrad)" stroke="#e85d2a" stroke-width="2"/>
  <circle cx="248" cy="176" r="4.5" fill="#e85d2a"/>
  <text x="262" y="180" fill="#e85d2a" class="section">RENDERER PROCESS</text>
  <text x="248" y="212" class="heading">React UI + Zustand state</text>
  <rect x="248" y="232" width="250" height="60" class="card"/>
  <rect x="260" y="244" width="4" height="36" rx="2" fill="#e85d2a"/>
  <text x="276" y="259" class="ctitle">main.jsx · App.jsx</text>
  <text x="276" y="277" class="csub">app shell · grid wiring</text>
  <rect x="515" y="232" width="250" height="60" class="card"/>
  <rect x="527" y="244" width="4" height="36" rx="2" fill="#e85d2a"/>
  <text x="543" y="259" class="ctitle">components · modals</text>
  <text x="543" y="277" class="csub">grid, menus, 19 modals</text>
  <rect x="782" y="232" width="250" height="60" class="card"/>
  <rect x="794" y="244" width="4" height="36" rx="2" fill="#e85d2a"/>
  <text x="810" y="259" class="ctitle">store · hooks · utils</text>
  <text x="810" y="277" class="csub">state + detection-rules</text>

  <!-- renderer -> preload -->
  <line x1="640" y1="310" x2="640" y2="345" class="spine" stroke="#e85d2a" marker-end="url(#aOrange)"/>
  <text x="656" y="333" fill="#e85d2a" class="flow">invoke</text>

  <!-- ============ PRELOAD ============ -->
  <rect x="300" y="349" width="680" height="62" class="panel" fill="url(#preloadGrad)" stroke="#a371f7" stroke-width="2"/>
  <circle cx="328" cy="377" r="4.5" fill="#a371f7"/>
  <text x="342" y="381" fill="#a371f7" class="section">PRELOAD BRIDGE · SECURE BOUNDARY</text>
  <text x="328" y="401" class="csub">window.tle API · context-isolated, node-integration off</text>

  <!-- preload -> main -->
  <line x1="640" y1="411" x2="640" y2="446" class="spine" stroke="#a371f7" marker-end="url(#aViolet)"/>
  <text x="656" y="434" fill="#a371f7" class="flow">IPC</text>

  <!-- ============ MAIN PROCESS ============ -->
  <rect x="220" y="450" width="840" height="158" class="panel" fill="url(#mainGrad)" stroke="#58a6ff" stroke-width="2"/>
  <circle cx="248" cy="476" r="4.5" fill="#58a6ff"/>
  <text x="262" y="480" fill="#58a6ff" class="section">MAIN PROCESS SERVICES</text>
  <text x="248" y="512" class="heading">Electron orchestration + IPC</text>
  <rect x="248" y="532" width="250" height="58" class="card"/>
  <rect x="260" y="544" width="4" height="34" rx="2" fill="#58a6ff"/>
  <text x="276" y="559" class="ctitle">main.js</text>
  <text x="276" y="577" class="csub">window · queue · safeHandle</text>
  <rect x="515" y="532" width="250" height="58" class="card"/>
  <rect x="527" y="544" width="4" height="34" rx="2" fill="#58a6ff"/>
  <text x="543" y="559" class="ctitle">import · menu · updater</text>
  <text x="543" y="577" class="csub">pipeline · menu · updates</text>
  <rect x="782" y="532" width="250" height="58" class="card"/>
  <rect x="794" y="544" width="4" height="34" rx="2" fill="#58a6ff"/>
  <text x="810" y="559" class="ctitle">ipc/ · 13 modules</text>
  <text x="810" y="577" class="csub">159 handlers across domains</text>

  <!-- main -> workers -->
  <line x1="640" y1="608" x2="640" y2="643" class="spine" stroke="#58a6ff" marker-end="url(#aBlue)"/>
  <text x="656" y="631" fill="#58a6ff" class="flow">spawn</text>

  <!-- ============ WORKER THREADS ============ -->
  <rect x="220" y="647" width="840" height="116" class="panel" fill="url(#workerGrad)" stroke="#d29922" stroke-width="2"/>
  <circle cx="248" cy="673" r="4.5" fill="#d29922"/>
  <text x="262" y="677" fill="#d29922" class="section">WORKER THREADS · electron/jobs</text>
  <rect x="248" y="691" width="192" height="56" class="card"/>
  <rect x="260" y="703" width="4" height="32" rx="2" fill="#d29922"/>
  <text x="276" y="717" class="ctitle">import-worker</text>
  <text x="276" y="734" class="csub">parse + insert</text>
  <rect x="452" y="691" width="192" height="56" class="card"/>
  <rect x="464" y="703" width="4" height="32" rx="2" fill="#3fb950"/>
  <text x="480" y="717" class="ctitle">index-worker</text>
  <text x="480" y="734" class="csub">index + FTS5</text>
  <rect x="656" y="691" width="192" height="56" class="card"/>
  <rect x="668" y="703" width="4" height="32" rx="2" fill="#f85149"/>
  <text x="684" y="717" class="ctitle">analyzer-worker</text>
  <text x="684" y="734" class="csub">forensic detectors</text>
  <rect x="860" y="691" width="172" height="56" class="card"/>
  <rect x="872" y="703" width="4" height="32" rx="2" fill="#f85149"/>
  <text x="888" y="717" class="ctitle">sigma-worker</text>
  <text x="888" y="734" class="csub">Sigma · Hayabusa</text>

  <!-- workers -> data -->
  <line x1="640" y1="763" x2="640" y2="798" class="spine" stroke="#d29922" marker-end="url(#aAmber)"/>
  <text x="656" y="786" fill="#d29922" class="flow">adopt</text>

  <!-- ============ DATA ENGINE ============ -->
  <rect x="220" y="802" width="840" height="158" class="panel" fill="url(#dataGrad)" stroke="#3fb950" stroke-width="2"/>
  <circle cx="248" cy="828" r="4.5" fill="#3fb950"/>
  <text x="262" y="832" fill="#3fb950" class="section">SQLITE DATA ENGINE</text>
  <text x="248" y="864" class="heading">TimelineDB + forensic analyzers</text>
  <rect x="248" y="884" width="250" height="58" class="card"/>
  <rect x="260" y="896" width="4" height="34" rx="2" fill="#3fb950"/>
  <text x="276" y="911" class="ctitle">db.js + db/</text>
  <text x="276" y="929" class="csub">query · tag · analytics · UDFs</text>
  <rect x="515" y="884" width="250" height="58" class="card"/>
  <rect x="527" y="896" width="4" height="34" rx="2" fill="#f85149"/>
  <text x="543" y="911" class="ctitle">analyzers/ · 10 domains</text>
  <text x="543" y="929" class="csub">ransomware · ADS · USN · LM</text>
  <rect x="782" y="884" width="250" height="58" class="card"/>
  <rect x="794" y="896" width="4" height="34" rx="2" fill="#f85149"/>
  <text x="810" y="911" class="ctitle">detection engines</text>
  <text x="810" y="929" class="csub">Sigma (JS+Hayabusa) · RDP</text>

  <!-- data -> parser -->
  <line x1="640" y1="960" x2="640" y2="995" class="spine" stroke="#3fb950" marker-end="url(#aGreen)"/>
  <text x="656" y="983" fill="#3fb950" class="flow">parse</text>

  <!-- ============ PARSER ============ -->
  <rect x="220" y="999" width="840" height="100" class="panel" fill="url(#parserGrad)" stroke="#d29922" stroke-width="2"/>
  <circle cx="248" cy="1025" r="4.5" fill="#d29922"/>
  <text x="262" y="1029" fill="#d29922" class="section">PARSER + IMPORT LAYER</text>
  <text x="248" y="1058" class="heading">Format dispatch · streaming + binary parsers</text>
  <rect x="248" y="1069" width="178" height="28" class="card"/>
  <text x="337" y="1087" text-anchor="middle" class="csub">parsers/index.js</text>
  <rect x="440" y="1069" width="178" height="28" class="card"/>
  <text x="529" y="1087" text-anchor="middle" class="csub">csv · xlsx</text>
  <rect x="632" y="1069" width="178" height="28" class="card"/>
  <text x="721" y="1087" text-anchor="middle" class="csub">evtx · plaso</text>
  <rect x="824" y="1069" width="208" height="28" class="card"/>
  <text x="928" y="1087" text-anchor="middle" class="csub">mft · usn · import.js</text>

  <!-- ============ SIDE CONNECTORS ============ -->
  <line x1="192" y1="250" x2="220" y2="250" class="rail" stroke="#d29922" marker-end="url(#aAmber)"/>
  <line x1="192" y1="690" x2="220" y2="690" class="rail" stroke="#f85149" marker-end="url(#aRed)"/>
  <line x1="1060" y1="230" x2="1088" y2="230" class="rail" stroke="#58a6ff" marker-end="url(#aBlue)"/>
  <line x1="1060" y1="460" x2="1088" y2="460" class="rail" stroke="#e85d2a" marker-end="url(#aOrange)"/>
  <line x1="1060" y1="805" x2="1088" y2="805" class="rail" stroke="#3fb950" marker-end="url(#aGreen)"/>

  <!-- ============ COLOR LEGEND ============ -->
  <rect x="220" y="1126" width="840" height="40" rx="12" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.07)"/>
  <circle cx="244" cy="1146" r="5" fill="#e85d2a"/><text x="256" y="1150" class="tiny">UI / output</text>
  <circle cx="356" cy="1146" r="5" fill="#a371f7"/><text x="368" y="1150" class="tiny">secure bridge</text>
  <circle cx="486" cy="1146" r="5" fill="#58a6ff"/><text x="498" y="1150" class="tiny">orchestration · network</text>
  <circle cx="682" cy="1146" r="5" fill="#d29922"/><text x="694" y="1150" class="tiny">ingestion · compute</text>
  <circle cx="858" cy="1146" r="5" fill="#3fb950"/><text x="870" y="1150" class="tiny">data · persistence</text>
  <circle cx="992" cy="1146" r="5" fill="#f85149"/><text x="1004" y="1150" class="tiny">forensic detection</text>
</svg>
